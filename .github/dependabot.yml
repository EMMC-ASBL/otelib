version: 2
updates:
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    time: "05:24"
  target-branch: master
  labels:
    - CI/CD
    - skip-changelog
  groups:
    actions:
      applies-to: version-updates
      patterns: ["*"]
    actions-security:
      applies-to: security-updates
      patterns: ["*"]
- package-ecosystem: pip
  directories:
    - "/"
    - "/.github/utils"
  schedule:
    interval: weekly
    day: monday
    time: "05:18"
  target-branch: master
  labels:
    - dependencies
    - skip-changelog
  groups:
    python:
      applies-to: version-updates
      patterns: ["*"]
    python-security:
      applies-to: security-updates
      patterns: ["*"]
